  <text x="80" y="210" fill="#1e3a8a" font-family="Arial, 'Malgun Gothic', sans-serif" font-size="26" font-weight="700">표준 작업 순서</text>
  <circle cx="92" cy="244" r="20" fill="#2563eb"/>
